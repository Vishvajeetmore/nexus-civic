version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: nexus-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  guardian-net:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/guardian-net"
    env_file:
      - .env
    environment:
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  pulse-report:
